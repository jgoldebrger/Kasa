rules:
  - id: hardcoded-secret
    pattern-either:
      - pattern: password = "..."
      - pattern: password = '...'
      - pattern: api_key = "..."
      - pattern: api_key = '...'
      - pattern: apiKey = "..."
      - pattern: apiKey = '...'
      - pattern: secret = "..."
      - pattern: secret = '...'
      - pattern: token = "..."
      - pattern: token = '...'
      - pattern: private_key = "..."
      - pattern: private_key = '...'
    pattern-not-inside: process.env.$KEY = ...
    paths:
      exclude:
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.integration.test.ts"
        - "e2e/**"
        - "scripts/**"
    message: Possible hardcoded secret — use environment variables.
    severity: ERROR
    languages: [javascript, typescript]

  - id: eval-usage
    pattern: eval(...)
    message: Avoid eval() — injection risk.
    severity: ERROR
    languages: [javascript, typescript]

  - id: dangerously-set-inner-html
    pattern: dangerouslySetInnerHTML
    message: Review XSS risk when using dangerouslySetInnerHTML.
    severity: WARNING
    languages: [typescript]

  - id: mongoose-find-with-user-input
    patterns:
      - pattern: '$MODEL.find({ $KEY: $VAL })'
    message: Ensure $VAL is validated/sanitized before Mongo queries.
    severity: WARNING
    languages: [javascript, typescript]

  - id: no-verify-api-csrf-on-mutation
    patterns:
      - pattern: |
          export async function $METHOD(request: NextRequest) {
            ...
          }
      - pattern-not: verifyApiCsrf(request)
      - metavariable-regex:
          metavariable: $METHOD
          regex: (POST|PUT|PATCH|DELETE)
    paths:
      include:
        - app/api/
    message: Legacy mutating API route may be missing verifyApiCsrf().
    severity: INFO
    languages: [typescript]
