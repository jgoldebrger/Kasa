name: semgrep

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config p/typescript \
            --config p/javascript \
            --config p/nodejs \
            --config .semgrep.yml \
            --severity ERROR \
            --error \
            --exclude node_modules \
            --exclude .next \
            --json \
            --output semgrep-results.json \
            .

      - name: Upload Semgrep report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 14
